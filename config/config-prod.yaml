# Configuración Production
# TODOS los secretos desde variables de ambiente

server:
  read_timeout: 60s
  write_timeout: 60s

messaging:
  rabbitmq:
    # URL desde ENV: RABBITMQ_URL (obligatorio)
    prefetch_count: 20

logging:
  level: "warn"
  format: "json"

# Autenticación centralizada con api-identity
api_identity:
  base_url: "http://api-identity:8070/api"
  timeout: "10s"
  cache_ttl: "120s"
  cache_enabled: true
  max_bulk_size: 100
