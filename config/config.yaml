# Configuración Base - Worker
# Plan 037 (D-037.11): worker en estado esqueleto, sin Postgres ni Mongo.
messaging:
  rabbitmq:
    queues:
      # Carril materiales (plan 041 lo revive como consumidor); hoy el worker no lo consume.
      material_uploaded: "edugo.material.uploaded"
      # Carril revisión asistida (plan 040): cola que consume el worker hoy.
      attempt_review_requested: "edugo.attempt.review_requested"
    exchanges:
      materials: "edugo.materials"
      assessments: "edugo.assessments"
    prefetch_count: 5
    dlq:
      enabled: true
      max_retries: 3
      retry_delay: "5s"
      dlx_exchange: "edugo_dlx"
      dlx_routing_key: "edugo.attempt.review_requested.dlq"
      use_exponential_backoff: true

nlp:
  # Provider activo: "openai", "anthropic", "mock"
  provider: "openai"

  # Configuraciones específicas por provider
  openai:
    api_key: "${OPENAI_API_KEY}" # Variable de entorno
    model: "gpt-4-turbo-preview"
    max_tokens: 4096
    temperature: 0.7
    timeout: "30s"
    # base_url: "https://custom-proxy.example.com/v1" # Opcional: para Azure OpenAI u otros proxies

  anthropic:
    api_key: "${ANTHROPIC_API_KEY}" # Variable de entorno
    model: "claude-3-sonnet-20240229"
    max_tokens: 4096
    temperature: 0.7
    timeout: "30s"

  # NOTA: Configuración general (deprecated, usar configuración específica del provider)
  # Solo se usa como fallback si el provider específico no tiene configuración
  # api_key: "${NLP_API_KEY}"
  # model: "gpt-4"
  # max_tokens: 4000
  # temperature: 0.7

logging:
  level: "info"
  format: "json"

# Autenticación centralizada con api-identity
api_identity:
  base_url: "http://api-identity:8070/api"
  timeout: "5s"
  cache_ttl: "60s"
  cache_enabled: true
  max_bulk_size: 50

# Clientes M2M de dominio (plan 039 F4). El worker lee la política LLM por escuela
# desde academic con un service JWT (scope schools.settings.read). El cliente de
# learning es andamiaje (stub) que llena el plan 040.
api_academic:
  base_url: "http://api-academic:8060"
  timeout: "5s"
  cache_ttl: "60s" # TTL corto: config leída por M2M en runtime (design 039 §7)

api_learning:
  base_url: "http://api-learning:8065"
  timeout: "5s"

# Firma del service JWT M2M (HS256). secret = env SERVICE_JWT_SECRET (Secret
# Manager en cloud), distinto del secret de usuarios. Issuer/Audience por
# convención del ecosistema (academic espera iss=edugo-identity, aud=edugo-api-academic).
service_jwt:
  secret: "${SERVICE_JWT_SECRET}"
  issuer: "edugo-identity"
  audience: "edugo-api-academic"
  client_id: "edugo-worker"
  ttl: "15m"

# Providers LLM (plan 039 D-039.3). Credenciales/URL/modelo son de EduGo, NO por
# escuela; lo por-escuela es solo la política (se lee vía M2M). El worker NO
# dispara generación/corrección todavía (eso es 040/041): esto deja la infra lista.
llm:
  local: # provider Ollama (modo "local")
    base_url: "${LLM_LOCAL_BASE_URL}" # ej. http://localhost:11434
    model: "${LLM_LOCAL_MODEL}" # ej. llama3.1, qwen2.5:7b
    timeout: "120s"
  api: # provider por API (modo "api": Claude/Gemini)
    provider: "${LLM_API_PROVIDER}" # anthropic | gemini
    api_key: "${LLM_API_KEY}" # Secret Manager en cloud
    model: "${LLM_API_MODEL}"
    timeout: "60s"
    max_tokens: 4096

# Health Checks
health:
  timeouts:
    rabbitmq: "3s"

# Circuit Breakers
circuit_breakers:
  nlp:
    max_failures: 5
    timeout: "60s"
    max_requests: 1
    success_threshold: 2

# Rate Limiter
rate_limiter:
  enabled: true

  # Configuración por tipo de evento
  by_event_type:
    material.uploaded:
      requests_per_second: 5.0 # Procesamiento PDF es costoso
      burst_size: 10.0

    material.reprocess:
      requests_per_second: 5.0 # Reproceso reusa el pipeline pesado de material
      burst_size: 10.0

  # Configuración por defecto para eventos no especificados
  default:
    requests_per_second: 10.0
    burst_size: 20.0

# Graceful Shutdown
shutdown:
  timeout: "30s" # Tiempo máximo para completar shutdown
  wait_for_messages: true # Esperar a que terminen los mensajes en proceso
