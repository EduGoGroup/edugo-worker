# Local Development
# Apunta a la infra docker real de dev:
#   Postgres -> edugo-migrator-postgres (host 5433, user/db edugo)
#   Mongo    -> edugo-migrator-mongodb  (host 27018, user edugo)
#   RabbitMQ -> edugo-rabbitmq           (host 5672, guest:guest)
# Patrón: host/port/user/db en el yaml; el password de Postgres llega por
# el ENV binding POSTGRES_PASSWORD (default edugo123 en el Makefile target dev).
database:
  postgres:
    host: "localhost"
    port: 5433
    user: "edugo"
    database: "edugo"
    # password -> ENV POSTGRES_PASSWORD (ver Makefile)
  mongodb:
    uri: "mongodb://edugo:edugo123@localhost:27018/edugo?authSource=admin"

messaging:
  rabbitmq:
    url: "amqp://guest:guest@localhost:5672/"

nlp:
  # En desarrollo local usamos mock por defecto (sin API key real)
  provider: "mock"

  # Para pruebas con OpenAI real, descomentar:
  # provider: "openai"
  # openai:
  #   api_key: "sk-test-key-local"
  #   model: "gpt-4-turbo-preview"
  #   timeout: "30s"

logging:
  level: "debug"
  format: "text"

# Autenticación centralizada con api-identity
api_identity:
  base_url: "http://localhost:8070/api"
  timeout: "5s"
  cache_ttl: "60s"
  cache_enabled: true
  max_bulk_size: 50

# Métricas Prometheus
metrics:
  enabled: true
  port: 9090

# Almacenamiento S3 (MinIO local)
storage:
  provider: "s3"
  timeout: "30s"
  s3:
    region: "us-east-1"
    bucket: "edugo-materials"
    endpoint: "http://localhost:9000"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    use_path_style: true
