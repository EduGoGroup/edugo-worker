# Local Development
# Plan 037 (D-037.11): el worker quedó como esqueleto sin Postgres ni Mongo.
# Su única dependencia de mensajería es RabbitMQ:
#   RabbitMQ -> edugo-rabbitmq (host 5672, guest:guest)
messaging:
  rabbitmq:
    url: "amqp://guest:guest@localhost:5672/"

nlp:
  # En desarrollo local usamos mock por defecto (sin API key real)
  provider: "mock"

  # Para pruebas con OpenAI real, descomentar:
  # provider: "openai"
  # openai:
  #   api_key: "sk-test-key-local"
  #   model: "gpt-4-turbo-preview"
  #   timeout: "30s"

logging:
  level: "debug"
  format: "text"

# Autenticación centralizada con api-identity
api_identity:
  base_url: "http://localhost:8070/api"
  timeout: "5s"
  cache_ttl: "60s"
  cache_enabled: true
  max_bulk_size: 50

# Clientes M2M de dominio (plan 039 F4). En local apuntan a las APIs nativas.
api_academic:
  base_url: "http://localhost:8060"
  timeout: "5s"
  cache_ttl: "60s"

api_learning:
  base_url: "http://localhost:8065"
  timeout: "5s"

# Service JWT M2M. En local el secret suele venir por env SERVICE_JWT_SECRET; si
# está vacío, el token se firma igual pero academic lo rechaza (M2M no operativo).
service_jwt:
  issuer: "edugo-identity"
  audience: "edugo-api-academic"
  client_id: "edugo-worker"
  ttl: "15m"

# LLM local: por defecto Ollama en localhost. Descomenta y ajusta el modelo que
# tengas instalado para usar el harness (make llm-harness) contra un modelo real.
llm:
  local:
    base_url: "http://localhost:11434"
    # gemma4:e4b (deuda 037, medido 2026-07-18): iguala o mejora a qwen3:1.7b (042)
    # y gemma3:4b (045) en las baterías prep/review/review-prep del harness — único
    # modelo para los tres rieles. temperature 0 = greedy determinista (viene de config.yaml).
    model: "gemma4:e4b"
    timeout: "120s"
  api:
    provider: "anthropic"
    # api_key: "sk-ant-..."  # normalmente por env LLM_API_KEY
    model: "claude-sonnet-5"
    timeout: "60s"
    max_tokens: 4096

# Métricas Prometheus
metrics:
  enabled: true
  port: 9090
