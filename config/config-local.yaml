# Local Development
# Plan 037 (D-037.11): el worker quedó como esqueleto sin Postgres ni Mongo.
# Su única dependencia de mensajería es RabbitMQ:
#   RabbitMQ -> edugo-rabbitmq (host 5672, guest:guest)
messaging:
  rabbitmq:
    url: "amqp://guest:guest@localhost:5672/"

nlp:
  # En desarrollo local usamos mock por defecto (sin API key real)
  provider: "mock"

  # Para pruebas con OpenAI real, descomentar:
  # provider: "openai"
  # openai:
  #   api_key: "sk-test-key-local"
  #   model: "gpt-4-turbo-preview"
  #   timeout: "30s"

logging:
  level: "debug"
  format: "text"

# Autenticación centralizada con api-identity
api_identity:
  base_url: "http://localhost:8070/api"
  timeout: "5s"
  cache_ttl: "60s"
  cache_enabled: true
  max_bulk_size: 50

# Métricas Prometheus
metrics:
  enabled: true
  port: 9090

# Almacenamiento S3 (MinIO local)
storage:
  provider: "s3"
  timeout: "30s"
  s3:
    region: "us-east-1"
    bucket: "edugo-materials"
    endpoint: "http://localhost:9000"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    use_path_style: true
